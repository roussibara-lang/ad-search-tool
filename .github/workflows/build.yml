name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install ldap3 pyinstaller

    - name: Compile to EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --collect-all ldap3 app.py

    - name: Upload Finished Executable
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/app.exe
